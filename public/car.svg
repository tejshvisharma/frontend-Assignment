<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 140" role="img" aria-labelledby="title desc">
  <title id="title">Sports car top view</title>
  <desc id="desc">A lime green sports car silhouette used as a fallback image.</desc>

  <defs>
    <linearGradient id="body" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b9ff2d"/>
      <stop offset="100%" stop-color="#8dd600"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d9f2ff"/>
      <stop offset="100%" stop-color="#8ab6d6"/>
    </linearGradient>
  </defs>

  <g transform="translate(6 8)">
    <rect x="18" y="40" width="276" height="58" rx="28" fill="url(#body)"/>
    <rect x="80" y="24" width="148" height="88" rx="40" fill="url(#body)"/>
    <rect x="108" y="38" width="92" height="60" rx="22" fill="url(#glass)"/>

    <rect x="24" y="45" width="18" height="48" rx="8" fill="#111" opacity="0.9"/>
    <rect x="270" y="45" width="18" height="48" rx="8" fill="#111" opacity="0.9"/>
    <rect x="98" y="32" width="14" height="12" rx="6" fill="#111" opacity="0.85"/>
    <rect x="196" y="32" width="14" height="12" rx="6" fill="#111" opacity="0.85"/>
    <rect x="98" y="92" width="14" height="12" rx="6" fill="#111" opacity="0.85"/>
    <rect x="196" y="92" width="14" height="12" rx="6" fill="#111" opacity="0.85"/>

    <rect x="152" y="38" width="4" height="60" fill="#1f2c35" opacity="0.45"/>
  </g>
</svg>
